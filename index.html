<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="file/logo.png">
    <title>Visiting Card Builder</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <h1 class="nav-title">Visiting Card Builder</h1>
    <a href="https://dr.susovon.workers.dev/" target="_blank" class="profile-btn">
        <strong>Susovon Jana, Ph.D.</strong><br>
        <span>Visit Profile →</span>
    </a>
</header>

<main class="page-wrapper">
    <section class="container">
        
        <section class="form-section">
            <h2 class="section-title">1. Enter Your Details</h2>
            <form id="cardForm">
                <label>Company / Organization Name</label>
                <input id="company" type="text" placeholder="Your University ">

                <label>Name</label>
                <input id="name" type="text" placeholder="Your Name">

                <label>Designation</label>
                <input id="title" type="text" placeholder="Your Designation">

                <label>Phone</label>
                <input id="phone" type="text" placeholder="+91 xxxxx xxxxx">

                <label>Email</label>
                <input id="email" type="email" placeholder="xxxxx@gmail.com">

                <label>Website</label>
                <input id="website" type="url" placeholder="https://dr.susovon.workers.dev">

                <label>Address</label>
                <textarea id="address" rows="2" placeholder="Address"></textarea>

                <hr class="form-divider">
                <h2 class="section-title" style="margin-top: 15px;">2. Background Design</h2>

                <label>Background Type</label>
                <select id="bgType">
                    <option value="color">Solid Color</option>
                    <option value="texture">Texture</option>
                    <option value="image">Custom Image</option>
                </select>

                <div id="bgColorContainer" class="dynamic-input">
                    <label>Card Color</label>
                    <input type="color" id="bgColor" value="#ffffff">
                </div>

                <div id="bgTextureContainer" class="dynamic-input" style="display: none;">
                    <label>Select Texture</label>
                    <select id="bgTexture">
                        <option value="kraft">Kraft Paper</option>
                        <option value="linen">Linen</option>
                        <option value="carbon">Carbon Fiber</option>
                        <option value="mesh">Dark Mesh</option>
                    </select>
                </div>

                <div id="bgImageContainer" class="dynamic-input" style="display: none;">
                    <label>Upload Background Image</label>
                    <p style="font-size: 11px; color: #666; margin-top: 0; line-height: 1.4;">
                        <em>Recommended size: <strong>1063 x 591 px</strong>. The builder will auto-adjust sizes that don't match.</em>
                    </p>
                    <input type="file" id="bgImageUpload" accept="image/png, image/jpeg, image/jpg">
                    
                    <label>Image Auto-Adjust Strategy</label>
                    <select id="bgImageFit">
                        <option value="cover" selected>Fill Entire Card (Best - crops excess edges)</option>
                        <option value="contain">Fit Inside (Leaves blank space)</option>
                        <option value="100% 100%">Stretch to Fit (May distort)</option>
                    </select>
                </div>
            </form>
        </section>

        <section class="preview-section right-panel">
            <h2 class="section-title">Live Preview</h2>
            <div class="preview-holder">
                <div id="cardPreview" class="card-preview card-horizontal">
                    </div>
            </div>

            <hr class="form-divider">
            <h2 class="section-title" style="margin-top: 15px; font-size: 18px;">3. Layout & Export</h2>
            
            <label>Card Format & Orientation</label>
            <div class="radio-group" id="formatGroup">
                <input type="radio" id="fmtHorz" name="cardFormat" value="horizontal" checked>
                <label for="fmtHorz"><i class="fa-regular fa-rectangle-list"></i> Horizontal<br><small>(90x50mm)</small></label>
                
                <input type="radio" id="fmtVert" name="cardFormat" value="vertical">
                <label for="fmtVert"><i class="fa-solid fa-mobile-screen"></i> Vertical<br><small>(50x90mm)</small></label>
                
                <input type="radio" id="fmtSquare" name="cardFormat" value="square">
                <label for="fmtSquare"><i class="fa-regular fa-square"></i> Square<br><small>(65x65mm)</small></label>
            </div>

            <div class="row-inputs">
                <div>
                    <label>Corner Accent Color</label>
                    <input type="color" id="accentColor" value="#0d47a1">
                </div>
                <div>
                    <label>Text Color</label>
                    <input type="color" id="textColor" value="#222222">
                </div>
            </div>
            
            <div class="row-inputs">
                <div style="grid-column: span 2;">
                    <label>Image Darkening Overlay (For readability)</label>
                    <input type="range" id="bgOverlay" min="0" max="0.9" step="0.1" value="0">
                </div>
            </div>

            <label>Export Resolution</label>
            <select id="exportScale">
                <option value="2">Standard (Good for Web)</option>
                <option value="4" selected>High (Sharp HQ)</option>
                <option value="8">Ultra (Print Quality 8x)</option>
            </select>

            <div class="button-row">
                <button type="button" id="resetBtn">Reset All</button>
                <button type="button" id="pngBtn"><i class="fa-solid fa-image"></i> Download PNG</button>
                <button type="button" id="pdfBtn"><i class="fa-solid fa-file-pdf"></i> Download PDF</button>
            </div>

        </section>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
