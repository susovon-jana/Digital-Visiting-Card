<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card body -->
  <rect x="4" y="14" width="56" height="36" rx="5" ry="5" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Top-left corner accent triangle -->
  <path d="M 4 14 L 24 14 L 4 28 Z" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Bottom-right corner accent triangle -->
  <path d="M 60 50 L 60 34 L 44 50 Z" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Name line (thick white bar) -->
  <rect x="13" y="26" width="24" height="3.5" rx="1.5" fill="white" opacity="0.95"/>

  <!-- Subtitle line (thin white bar) -->
  <rect x="13" y="32" width="16" height="2" rx="1" fill="white" opacity="0.6"/>

  <!-- Contact lines (two short bars) -->
  <rect x="13" y="37" width="20" height="1.5" rx="0.75" fill="white" opacity="0.4"/>
  <rect x="13" y="40.5" width="14" height="1.5" rx="0.75" fill="white" opacity="0.4"/>

  <!-- QR code placeholder (small grid) -->
  <rect x="41" y="27" width="13" height="13" rx="1.5" fill="white" opacity="0.15"/>
  <rect x="43" y="29" width="4" height="4" rx="0.5" fill="white" opacity="0.7"/>
  <rect x="49" y="29" width="4" height="4" rx="0.5" fill="white" opacity="0.7"/>
  <rect x="43" y="35" width="4" height="4" rx="0.5" fill="white" opacity="0.7"/>
  <rect x="49" y="35" width="2" height="2" rx="0.3" fill="white" opacity="0.5"/>
  <rect x="52" y="37" width="2" height="2" rx="0.3" fill="white" opacity="0.5"/>

  <!-- Tiny divider bar -->
  <rect x="13" y="22.5" width="6" height="1.5" rx="0.75" fill="#42A5F5" opacity="0.9"/>

</svg>
